<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Warehouse Management System - Premium, Audit-Ready WMS Interface">
  <title>Warehouse Management System</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">

  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script src="app.js" defer></script>

  <style>
    :root {
      --ink: #101828;
      --ink-soft: #344054;
      --muted: #667085;
      --faint: #98A2B3;
      --canvas: #F5F6F8;
      --surface: #FFFFFF;
      --border: #E4E7EC;
      --border-soft: #EDEFF3;
      --accent: #0D9488;
      --accent-dark: #0F766E;
      --accent-tint: #EFFCFA;
      --accent-tint-strong: #CCFBF1;
      --success: #16A34A;
      --success-bg: #ECFDF3;
      --warning: #B45309;
      --warning-bg: #FFFBEB;
      --danger: #DC2626;
      --danger-bg: #FEF3F2;
      --presence-live: #22C55E;
      --presence-away: #F59E0B;
      --presence-off: #D0D5DD;
      --sidebar-bg: #0E1420;
      --sidebar-border: rgba(255, 255, 255, 0.07);
      --sidebar-text: rgba(255, 255, 255, 0.68);
      --sidebar-text-dim: rgba(255, 255, 255, 0.36);
      --sidebar-hover: rgba(255, 255, 255, 0.06);
      --sidebar-active-bg: rgba(45, 212, 191, 0.14);
      --sidebar-active-text: #5EEAD4;
      --sidebar-w: 250px;
      --sidebar-w-collapsed: 70px;
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 7px;
      --shadow-card: 0 1px 2px rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.06);
      --shadow-card-hover: 0 4px 12px rgba(16, 24, 40, 0.08), 0 2px 4px rgba(16, 24, 40, 0.04);
    }

    .redesign-shell * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    .redesign-shell {
      display: flex;
      min-height: 100vh;
    }

    .redesign-shell h1, .redesign-shell h2, .redesign-shell h3, .redesign-shell .brand-name {
      font-family: 'Manrope', sans-serif;
    }

    .redesign-shell .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      z-index: 100;
      overflow: hidden;
      transition: width 0.22s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.22s;
    }

    body.sidebar-collapsed .redesign-shell .sidebar {
      width: var(--sidebar-w-collapsed);
    }

    body.sidebar-collapsed .redesign-shell .sidebar:hover {
      width: var(--sidebar-w);
      box-shadow: 14px 0 32px rgba(16, 24, 40, 0.35);
    }

    .redesign-shell .main {
      margin-left: var(--sidebar-w);
      transition: margin-left 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    body.sidebar-collapsed .redesign-shell .main {
      margin-left: var(--sidebar-w-collapsed);
    }

    .redesign-shell .sidebar-top {
      padding: 22px 20px 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .redesign-shell .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      box-shadow: 0 3px 10px rgba(13, 148, 136, 0.4);
      flex-shrink: 0;
    }

    .redesign-shell .brand-name {
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .redesign-shell .brand-sub {
      font-size: 10.5px;
      color: var(--sidebar-text-dim);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .redesign-shell .brand-text {
      white-space: nowrap;
      overflow: hidden;
      max-width: 200px;
      opacity: 1;
      transition: max-width 0.18s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.12s, margin 0.18s;
    }

    .redesign-shell .nav-group {
      padding: 16px 12px 4px;
    }

    .redesign-shell .nav-group-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--sidebar-text-dim);
      padding: 0 10px 8px;
      overflow: hidden;
      max-height: 20px;
      opacity: 1;
      transition: max-height 0.18s, opacity 0.12s, padding 0.18s;
    }

    .redesign-shell .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 10px;
      border-radius: 8px;
      color: var(--sidebar-text);
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 2px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s, color 0.15s;
    }

    .redesign-shell .nav-item i {
      width: 18px;
      text-align: center;
      font-size: 14px;
      color: var(--sidebar-text-dim);
      transition: color 0.15s;
    }

    .redesign-shell .nav-item:hover {
      background: var(--sidebar-hover);
      color: #fff;
    }

    .redesign-shell .nav-item.active {
      background: var(--sidebar-active-bg);
      color: var(--sidebar-active-text);
      font-weight: 700;
      box-shadow: inset 3px 0 0 var(--sidebar-active-text);
    }

    .redesign-shell .nav-item.active i {
      color: var(--sidebar-active-text);
    }

    .redesign-shell .nav-label {
      white-space: nowrap;
      overflow: hidden;
      max-width: 200px;
      opacity: 1;
      transition: max-width 0.18s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.12s, margin 0.18s;
    }

    .redesign-shell .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 17px;
      height: 17px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }

    body.sidebar-collapsed .redesign-shell .sidebar .brand-text,
    body.sidebar-collapsed .redesign-shell .sidebar .nav-label {
      max-width: 0;
      opacity: 0;
      margin-left: 0;
    }

    body.sidebar-collapsed .redesign-shell .sidebar .nav-group-label {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    body.sidebar-collapsed .redesign-shell .sidebar .nav-badge {
      opacity: 0;
      pointer-events: none;
      width: 0;
      overflow: hidden;
    }

    body.sidebar-collapsed .redesign-shell .sidebar:hover .brand-text,
    body.sidebar-collapsed .redesign-shell .sidebar:hover .nav-label {
      max-width: 200px;
      opacity: 1;
      transition: max-width 0.2s 0.05s, opacity 0.18s 0.08s;
    }

    body.sidebar-collapsed .redesign-shell .sidebar:hover .nav-group-label {
      max-height: 20px;
      opacity: 1;
      padding-bottom: 8px;
      transition: max-height 0.2s 0.05s, opacity 0.18s 0.08s, padding 0.2s 0.05s;
    }

    body.sidebar-collapsed .redesign-shell .sidebar:hover .nav-badge {
      opacity: 1;
      pointer-events: auto;
      width: auto;
      transition: opacity 0.18s 0.1s;
    }

    body.sidebar-collapsed .redesign-shell .sidebar .nav-item {
      justify-content: center;
      gap: 0;
    }

    body.sidebar-collapsed .redesign-shell .sidebar:hover .nav-item {
      justify-content: flex-start;
      gap: 11px;
    }

    .redesign-shell .sidebar-footer {
      margin-top: auto;
      padding: 14px;
      border-top: 1px solid var(--sidebar-border);
    }

    .redesign-shell .me-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
    }

    .redesign-shell .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 11.5px;
      flex-shrink: 0;
      position: relative;
    }

    .redesign-shell .me-text {
      white-space: nowrap;
      overflow: hidden;
      max-width: 200px;
      opacity: 1;
      transition: max-width 0.18s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.12s, margin 0.18s;
    }

    .redesign-shell .me-name {
      font-size: 12.5px;
      font-weight: 700;
      color: #fff;
    }

    .redesign-shell .me-role {
      font-size: 10.5px;
      color: var(--sidebar-text-dim);
    }

    .redesign-shell .topbar {
      height: 66px;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .redesign-shell .topbar h1 {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .redesign-shell .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .redesign-shell .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--canvas);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px 12px;
      width: 230px;
    }

    .redesign-shell .search-box i {
      color: var(--faint);
      font-size: 12.5px;
    }

    .redesign-shell .search-box input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--ink);
      width: 100%;
    }

    .redesign-shell .search-box input::placeholder {
      color: var(--faint);
    }

    .redesign-shell .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      font-size: 14px;
      transition: all 0.2s;
    }

    .redesign-shell .icon-btn:hover {
      background: var(--canvas);
    }

    .redesign-shell .sidebar-toggle-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 13.5px;
      transition: all 0.2s;
    }

    .redesign-shell .sidebar-toggle-btn:hover {
      background: var(--canvas);
    }

    .redesign-shell .content {
      padding: 26px 28px 60px;
      flex: 1;
    }

    .redesign-shell .tab-view {
      display: none;
    }

    .redesign-shell .tab-view.active {
      display: block;
      animation: fadein 0.2s ease;
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="redesign-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand-mark"><i class="fa-solid fa-warehouse"></i></div>
      <div class="brand-text">
        <div class="brand-name">Ace Remnants</div>
        <div class="brand-sub">Warehouse WMS</div>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Overview</div>
      <div class="nav-item active" data-tab="dashboard" onclick="showTab('dashboard')"><i class="fa-solid fa-chart-line"></i><span class="nav-label">Dashboard</span></div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Operations</div>
      <div class="nav-item" data-tab="inventory" onclick="showTab('inventory')"><i class="fa-solid fa-boxes-stacked"></i><span class="nav-label">Inventory</span></div>
      <div class="nav-item" data-tab="stock-in" onclick="showTab('stock-in')"><i class="fa-solid fa-arrow-down-long"></i><span class="nav-label">Stock In</span></div>
      <div class="nav-item" data-tab="stock-out" onclick="showTab('stock-out')"><i class="fa-solid fa-arrow-up-long"></i><span class="nav-label">Stock Out</span></div>
      <div class="nav-item" data-tab="barcode" onclick="showTab('barcode')"><i class="fa-solid fa-barcode"></i><span class="nav-label">Barcode &amp; Scan</span></div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Admin</div>
      <div class="nav-item" data-tab="reports" onclick="showTab('reports')"><i class="fa-solid fa-chart-pie"></i><span class="nav-label">Reports</span></div>
      <div class="nav-item" data-tab="approvals" onclick="showTab('approvals')"><i class="fa-solid fa-user-check"></i><span class="nav-label">User Approvals</span><span class="nav-badge">2</span></div>
      <div class="nav-item" data-tab="activity" onclick="showTab('activity')"><i class="fa-solid fa-clock-rotate-left"></i><span class="nav-label">Activity Log</span></div>
      <div class="nav-item" data-tab="settings" onclick="showTab('settings')"><i class="fa-solid fa-gear"></i><span class="nav-label">Settings</span></div>
    </div>

    <div class="sidebar-footer">
      <div class="me-card">
        <div class="avatar" id="global-profile-initials">JP</div>
        <div class="me-text">
          <div class="me-name" id="global-header-username">John Doe</div>
          <div class="me-role" id="global-header-role">Warehouse Admin</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="sidebar-toggle-btn" id="sidebar-toggle" title="Toggle sidebar">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1 id="header-warehouse-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="topbar-search" placeholder="Quick SKU search..." onkeypress="if(event.key === 'Enter') { handleTopbarScanRedirect(this.value); this.value = ''; }">
        </div>
        <button class="icon-btn" id="theme-toggle" title="Toggle theme"><i class="fa-solid fa-sun"></i></button>
        <button class="icon-btn" id="profile-btn" title="My Profile" onclick="openProfileModal()"><i class="fa-solid fa-circle-user"></i></button>
        <button class="icon-btn" id="logout-btn" title="Sign Out" onclick="WMSAuth.signOut()"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>

    <div class="content">
      <!-- Dashboard Tab -->
      <section id="view-dashboard" class="tab-view active"></section>

      <!-- Inventory Tab -->
      <section id="view-inventory" class="tab-view"></section>

      <!-- Stock In Tab -->
      <section id="view-stock-in" class="tab-view"></section>

      <!-- Stock Out Tab -->
      <section id="view-stock-out" class="tab-view"></section>

      <!-- Barcode Tab -->
      <section id="view-barcode" class="tab-view"></section>

      <!-- Reports Tab -->
      <section id="view-reports" class="tab-view"></section>

      <!-- Approvals Tab -->
      <section id="view-approvals" class="tab-view"></section>

      <!-- Activity Log Tab -->
      <section id="view-activity-log" class="tab-view"></section>

      <!-- Settings Tab -->
      <section id="view-settings" class="tab-view"></section>
    </div>
  </main>
</div>

<script>
// Tab switching and sidebar management
function showTab(name) {
  document.querySelectorAll('.nav-item[data-tab]').forEach(n => {
    n.classList.toggle('active', n.dataset.tab === name);
  });
  document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
  
  const tabEl = document.getElementById('view-' + name);
  if (tabEl) tabEl.classList.add('active');
  
  const titles = {
    'dashboard': 'Dashboard',
    'inventory': 'Inventory',
    'stock-in': 'Stock In',
    'stock-out': 'Stock Out',
    'barcode': 'Barcode & Scan',
    'reports': 'Reports',
    'approvals': 'User Approvals',
    'activity': 'Activity Log',
    'settings': 'Settings'
  };
  document.getElementById('header-warehouse-title').textContent = titles[name] || 'Warehouse';
}

document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
  document.body.classList.toggle('sidebar-collapsed');
});

// Theme toggle
const themeBtn = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem('wms_theme') || 'dark';
if (savedTheme === 'light') document.body.classList.add('light-theme');
updateThemeIcon();

function updateThemeIcon() {
  const isLight = document.body.classList.contains('light-theme');
  if (themeBtn) themeBtn.querySelector('i').className = isLight ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
}

themeBtn?.addEventListener('click', () => {
  document.body.classList.toggle('light-theme');
  const isLight = document.body.classList.contains('light-theme');
  localStorage.setItem('wms_theme', isLight ? 'light' : 'dark');
  updateThemeIcon();
});
</script>

</body>
</html>
